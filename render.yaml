# =============================================================================
# Blueprint Render — « Le Guetteur » : TOUT sur Render, en deux services web.
#
#   • le-guetteur-api   → back Python/Flask (dashboard Jinja + API JSON /api/*)
#   • le-guetteur-front → front Next.js, proxifie /api vers le back (BACKEND_URL)
#
# À placer à la RACINE du dépôt Git connecté à Render. Ici la racine = RENDU/
# (elle contient back/ et front/). Si tu pousses MINI-PROJET/ à la place, préfixe
# les rootDir par RENDU/ (ex. `rootDir: RENDU/back`).
#
# Déploiement : Render → New + → Blueprint → connecte le repo → Apply.
# Détails et alternative « à la main » : voir DEPLOY.md.
# =============================================================================
services:
  # --- Back : pipeline + Flask (Jinja + API JSON) ---------------------------
  - type: web
    name: le-guetteur-api
    runtime: python
    rootDir: back
    plan: free
    region: frankfurt
    # Ingestion au BUILD : la base SQLite est peuplée dans le filesystem servi
    # ensuite → le port se lie immédiatement au démarrage (pas de timeout de
    # health check). Chaque redeploy = base ré-alimentée avec de vrais articles.
    buildCommand: pip install -r requirements.txt && python main.py
    startCommand: gunicorn dashboard.app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: VEILLE_DB
        value: data/veille.db
      - key: SECRET_KEY            # signe les cookies de session Flask (généré)
        generateValue: true
      - key: TRANSLATE_BACKEND     # pas d'Ollama en cloud → on n'essaie même pas
        value: "off"
      - key: REQUIRE_LLM_SUMMARY   # BYOK pur : 1 = jamais d'anglais extractif. Sans clé au
        value: "1"                 # build → aucun résumé → purge → base vide. Un compte à clé
                                   # la remplit en 100% FR/Claude au 1er « Chercher des articles ».
      - key: ANTHROPIC_MODEL   # défaut global (invités / fallback) — Haiku, le moins cher
        value: claude-haiku-4-5-20251001   # alt. qualité : claude-sonnet-5 / claude-opus-4-8
      # BYOK pur : PAS de clé serveur. Chaque compte apporte la sienne (Réglages / inscription),
      # utilisée quand CE compte lance « Chercher de nouveaux articles ».
      # (Pour repasser en hybride : décommenter et saisir la clé en secret dans Render.)
      # - key: ANTHROPIC_API_KEY
      #   sync: false

  # --- Front : Next.js (App Router) -----------------------------------------
  - type: web
    name: le-guetteur-front
    runtime: node
    rootDir: front
    plan: free
    region: frankfurt
    # --include=dev : Render peut poser NODE_ENV=production → sans ça, tailwind/
    # typescript (devDependencies) ne s'installent pas et le build échoue.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      # ⚠️ DOIT correspondre à l'URL PUBLIQUE réelle du service API ci-dessus.
      # Render nomme l'URL d'après le service ; vérifie-la après le 1er déploiement
      # et corrige ici si un suffixe a été ajouté. Le scheme https:// est requis.
      - key: BACKEND_URL
        value: https://le-guetteur-api.onrender.com
